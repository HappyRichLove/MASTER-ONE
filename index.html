<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MASTER ONE</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f0ece4">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #f0ece4;
            color: #5a5245;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            color: #af914e;
            margin-bottom: 0.3rem;
        }
        .subtitle {
            color: #b5a998;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(175,145,78,0.15);
            border-radius: 16px;
            padding: 1.5rem;
            width: 100%;
            max-width: 440px;
            margin-bottom: 1rem;
        }
        .card-title {
            font-size: 0.75rem;
            color: #b5a998;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.75rem;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
        }
        .dot.active { background: #a8c686; }
        button {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            font-family: inherit;
        }
        button:active { transform: scale(0.97); }
        button:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-subscribe {
            background: linear-gradient(135deg, #c4a35a, #af914e);
            color: #fff;
        }
        .btn-test {
            background: rgba(175,145,78,0.1);
            color: #af914e;
            border: 1px solid rgba(175,145,78,0.25);
        }
        .btn-row {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .btn-row button { flex: 1; padding: 0.7rem; font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            padding: 0.7rem 0.9rem;
            border: 1px solid rgba(175,145,78,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.6);
            color: #5a5245;
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus { border-color: #af914e; }
        textarea { resize: vertical; min-height: 60px; }
        label {
            display: block;
            font-size: 0.75rem;
            color: #b5a998;
            margin-bottom: 0.25rem;
            letter-spacing: 0.03em;
        }
        .sub-json {
            padding: 0.7rem;
            background: rgba(175,145,78,0.06);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.65rem;
            word-break: break-all;
            max-height: 80px;
            overflow-y: auto;
            color: #af914e;
            cursor: pointer;
            user-select: all;
        }
        .sub-json:hover { background: rgba(175,145,78,0.12); }
        .copied {
            text-align: center;
            color: #a8c686;
            font-size: 0.8rem;
            margin-top: 0.3rem;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .copied.show { opacity: 1; }
        .log {
            padding: 0.8rem;
            background: rgba(175,145,78,0.04);
            border-radius: 10px;
            font-family: monospace;
            font-size: 0.75rem;
            max-height: 160px;
            overflow-y: auto;
        }
        .log-entry {
            padding: 0.2rem 0;
            border-bottom: 1px solid rgba(175,145,78,0.08);
        }
        .log-entry:last-child { border: none; }
        .log-time { color: #c4a35a; }
    </style>
</head>
<body>
    <h1>MASTER ONE</h1>
    <p class="subtitle">push-notifications</p>

    <div class="card">
        <div class="status">
            <div class="dot" id="statusDot"></div>
            <span id="statusText">not subscribed</span>
        </div>
        <button class="btn-subscribe" id="btnSubscribe" onclick="subscribe()">
            Подписаться
        </button>
    </div>

    <div class="card" id="subCard" style="display:none;">
        <div class="card-title">Subscription</div>
        <div class="sub-json" id="subJson" onclick="copySubscription()"></div>
        <div class="copied" id="copiedMsg">Copied</div>
    </div>

    <div class="card" id="editorCard">
        <div class="card-title">Message</div>
        <label>Title</label>
        <input type="text" id="msgTitle" value="MASTER ONE" placeholder="Title">
        <label>Body</label>
        <textarea id="msgBody" placeholder="Message text">New content is here</textarea>
        <label>Link (optional)</label>
        <input type="url" id="msgUrl" placeholder="https://...">

        <div class="btn-row">
            <button class="btn-test" id="btnTest5" onclick="sendDelayed(5)" disabled>5s</button>
            <button class="btn-test" id="btnTest10" onclick="sendDelayed(10)" disabled>10s</button>
            <button class="btn-test" id="btnTestNow" onclick="sendDelayed(0)" disabled>Now</button>
        </div>
    </div>

    <div class="card" id="countdown-card" style="display:none; text-align:center;">
        <div style="font-size: 2.5rem; font-weight: 300; color: #af914e;" id="countdownNum">10</div>
        <div style="color: #b5a998; font-size: 0.8rem; letter-spacing: 0.05em;">minimize the app</div>
    </div>

    <div class="card">
        <div class="card-title">Log</div>
        <div class="log" id="log"></div>
    </div>

    <script>
        const VAPID_PUBLIC_KEY = 'BIc4P3VP6bOTOkWqgiMI6YsjkuXemhvTCiVN5nIAU8Gc-s-u-lJ7yNkAKnSGkFDUi0p_z2d1pY29qogiijCjvXw';

        const logEl = document.getElementById('log');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const btnSubscribe = document.getElementById('btnSubscribe');
        const subCard = document.getElementById('subCard');
        const subJson = document.getElementById('subJson');

        let currentSubscription = null;

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('ru-RU');
            logEl.innerHTML = `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>` + logEl.innerHTML;
        }

        function updateStatus(subscribed) {
            statusDot.classList.toggle('active', subscribed);
            statusText.textContent = subscribed ? 'subscribed' : 'not subscribed';
            btnSubscribe.textContent = subscribed ? 'Unsubscribe' : 'Subscribe';
            document.getElementById('btnTest5').disabled = !subscribed;
            document.getElementById('btnTest10').disabled = !subscribed;
            document.getElementById('btnTestNow').disabled = !subscribed;
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const raw = atob(base64);
            const arr = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
            return arr;
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(async reg => {
                    addLog('Service Worker OK');
                    const sub = await reg.pushManager.getSubscription();
                    if (sub) {
                        currentSubscription = sub;
                        showSubscription(sub);
                        updateStatus(true);
                        addLog('Push active');
                    }
                })
                .catch(err => addLog('SW error: ' + err.message));
        } else {
            addLog('Service Worker not supported');
        }

        async function subscribe() {
            const reg = await navigator.serviceWorker.ready;
            const existing = await reg.pushManager.getSubscription();

            if (existing) {
                await existing.unsubscribe();
                currentSubscription = null;
                subCard.style.display = 'none';
                updateStatus(false);
                addLog('Unsubscribed');
                return;
            }

            addLog('Requesting permission...');
            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                addLog('Permission denied');
                return;
            }

            try {
                const sub = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });
                currentSubscription = sub;
                showSubscription(sub);
                updateStatus(true);
                addLog('Subscribed');
            } catch (err) {
                addLog('Error: ' + err.message);
            }
        }

        function showSubscription(sub) {
            subCard.style.display = 'block';
            subJson.textContent = JSON.stringify(sub.toJSON());
        }

        function copySubscription() {
            navigator.clipboard.writeText(subJson.textContent).then(() => {
                const msg = document.getElementById('copiedMsg');
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 1500);
            });
        }

        let countdownTimer = null;

        function sendDelayed(seconds) {
            if (Notification.permission !== 'granted') {
                addLog('No permission');
                return;
            }
            if (seconds === 0) { fireNotification(); return; }

            addLog(`Notification in ${seconds}s`);
            const card = document.getElementById('countdown-card');
            const num = document.getElementById('countdownNum');
            card.style.display = 'block';
            let remaining = seconds;
            num.textContent = remaining;

            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                remaining--;
                num.textContent = remaining;
                if (remaining <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    card.style.display = 'none';
                    fireNotification();
                }
            }, 1000);
        }

        function fireNotification() {
            const title = document.getElementById('msgTitle').value || 'MASTER ONE';
            const body = document.getElementById('msgBody').value || 'New content';
            const url = document.getElementById('msgUrl').value;

            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(title, {
                    body: body,
                    icon: 'icon-192.png',
                    badge: 'icon-192.png',
                    vibrate: [200, 100, 200],
                    tag: 'post-' + Date.now(),
                    data: { url: url },
                    actions: [
                        { action: 'open', title: 'Open' },
                        { action: 'close', title: 'Later' }
                    ]
                });
                addLog('Notification sent');
            });
        }
    </script>
</body>
</html>
